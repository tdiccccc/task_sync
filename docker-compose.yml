# ./docker-compose.yml
version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: task-sync-app-dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    ports:
      - "8200:8200"  # Laravel
      - "5173:5173"  # Vite
    depends_on:
      - db
    networks:
      - task-sync-app

  db:
    image: mysql:8.0
    container_name: task-sync-app-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - task-sync-app

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: task-sync-app-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
      PHP_MEMORY_LIMIT: 512M # メモリリミットを増やす
    ports:
      - 8205:80
    depends_on:
      - db
    networks:
      - task-sync-app


networks:
  task-sync-app:
    driver: bridge

volumes:
  db_data:
